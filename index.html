<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitcher Matchup Lens</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #090d12;
  --surface: #10161e;
  --surface2: #141c26;
  --border: #1c2530;
  --border2: #243040;
  --text: #dde4ee;
  --muted: #506070;
  --muted2: #8090a0;
  --accent: #3b9eff;
  --accent2: #1a6fbf;
  --green: #22c55e;
  --yellow: #f59e0b;
  --red: #ef4444;
  --green-bg: rgba(34,197,94,0.10);
  --yellow-bg: rgba(245,158,11,0.10);
  --red-bg: rgba(239,68,68,0.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ── Top bar ── */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 200;
}

.logo {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  white-space: nowrap;
}

.topbar-controls {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  flex: 1;
}

.field-wrap {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.field-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}

input, select {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 5px;
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  padding: 8px 11px;
  outline: none;
  transition: border-color 0.15s;
  height: 36px;
}

input:focus, select:focus { border-color: var(--accent); }
select option { background: #141c26; }
#pitcherInputWrap { min-width: 220px; }
#teamSelect { min-width: 200px; }

.btn-analyze {
  background: var(--accent);
  border: none;
  border-radius: 5px;
  color: #fff;
  cursor: pointer;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 0 18px;
  height: 36px;
  white-space: nowrap;
  transition: opacity 0.15s, transform 0.1s;
  align-self: flex-end;
}
.btn-analyze:hover { opacity: 0.85; }
.btn-analyze:active { transform: scale(0.97); }
.btn-analyze:disabled { opacity: 0.35; cursor: not-allowed; }

/* Autocomplete */
.autocomplete-wrap { position: relative; }
.autocomplete-list {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  background: #1a2535;
  border: 1px solid var(--border2);
  border-radius: 6px;
  z-index: 300;
  max-height: 220px;
  overflow-y: auto;
  display: none;
}
.autocomplete-list.open { display: block; }
.autocomplete-item {
  padding: 9px 12px;
  cursor: pointer;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}
.autocomplete-item:last-child { border-bottom: none; }
.autocomplete-item:hover { background: var(--border2); }
.autocomplete-item .sub { font-size: 11px; color: var(--muted2); }

/* ── Main layout ── */
.main { max-width: 1100px; margin: 0 auto; padding: 28px 20px 0; }

/* ── State box ── */
.state-box {
  padding: 64px 20px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.8;
}
.state-box .icon { font-size: 36px; display: block; margin-bottom: 14px; }
.spinner {
  width: 30px; height: 30px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
  margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Section label ── */
.section-eyebrow {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

/* ── Verdict banner ── */
.verdict-banner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 18px 24px;
  margin-bottom: 20px;
}
.matchup-title { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
.matchup-title .vs { color: var(--muted); font-weight: 400; margin: 0 8px; }
.verdict-pill {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 5px;
}
.verdict-pill.favorable { background: var(--green-bg); color: var(--green); }
.verdict-pill.neutral   { background: var(--yellow-bg); color: var(--yellow); }
.verdict-pill.tough     { background: var(--red-bg);  color: var(--red); }

.edge-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
}
.edge-track {
  flex: 1; height: 5px;
  background: var(--border2);
  border-radius: 3px;
  overflow: hidden;
}
.edge-fill { height: 100%; border-radius: 3px; transition: width 0.7s ease; }
.edge-num {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  width: 38px;
  text-align: right;
}

/* ── Grid layout for sections ── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.full-col { margin-bottom: 16px; }

/* ── Cards ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.card-head {
  padding: 12px 18px 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-title {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted2);
}
.card-body { padding: 16px 18px; }

/* ── Stat grid ── */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
.stat-cell {
  padding: 14px 16px;
  border-right: 1px solid var(--border);
}
.stat-cell:last-child { border-right: none; }
.stat-lbl {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 5px;
}
.stat-val {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.03em;
  line-height: 1;
}
.stat-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
.good { color: var(--green); }
.mid  { color: var(--yellow); }
.bad  { color: var(--red); }
.plain { color: var(--text); }

/* ── Pitch zone heatmap ── */
.zone-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 16px;
}
.zone-title {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  text-align: center;
}
.zone-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 3px;
  width: 180px;
}
.zone-cell {
  aspect-ratio: 1;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  cursor: default;
  transition: transform 0.1s;
  position: relative;
}
.zone-cell:hover { transform: scale(1.08); z-index: 10; }
.zone-legend {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: center;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  color: var(--muted2);
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 2px;
}

/* ── Game log ── */
.log-tabs {
  display: flex;
  gap: 2px;
  padding: 12px 16px 0;
}
.log-tab {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 6px 12px;
  border-radius: 4px 4px 0 0;
  border: 1px solid transparent;
  cursor: pointer;
  color: var(--muted);
  background: none;
  transition: color 0.15s, background 0.15s;
}
.log-tab:hover { color: var(--text); }
.log-tab.active {
  color: var(--accent);
  background: var(--surface2);
  border-color: var(--border2);
  border-bottom-color: var(--surface2);
}
.log-table-wrap { padding: 0 16px 16px; overflow-x: auto; }
.log-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.log-table th {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 8px 10px;
  text-align: left;
  border-bottom: 1px solid var(--border2);
  white-space: nowrap;
}
.log-table td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
  white-space: nowrap;
}
.log-table tr:last-child td { border-bottom: none; }
.log-table tr:hover td { background: rgba(255,255,255,0.02); }
.perf-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
}

/* ── Deep matchup breakdown ── */
.matchup-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
}
.matchup-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
.matchup-row:last-child { border-bottom: none; }
.matchup-stat-name {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  text-align: center;
  grid-column: 2;
}
.matchup-val {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.02em;
}
.matchup-val.left { text-align: right; }
.matchup-val.right { text-align: left; }
.matchup-bar-wrap {
  grid-column: 1 / -1;
  margin-top: 3px;
}
.matchup-bar-track {
  height: 3px;
  background: var(--border2);
  border-radius: 2px;
  position: relative;
  overflow: hidden;
}
.matchup-bar-fill {
  position: absolute;
  height: 100%;
  border-radius: 2px;
  transition: width 0.6s ease;
}

/* ── AI Analysis ── */
.analysis-box {
  padding: 18px 20px;
  line-height: 1.75;
  font-size: 13px;
  color: var(--muted2);
}
.analysis-box strong { color: var(--text); }
.analysis-loading {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 18px 20px;
  color: var(--muted);
  font-size: 13px;
}
.analysis-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 1.2s ease-in-out infinite;
}
.analysis-dot:nth-child(2) { animation-delay: 0.2s; }
.analysis-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

.source-note {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.06em;
  color: var(--muted);
  opacity: 0.5;
  text-align: right;
  margin-top: 6px;
}

@media (max-width: 700px) {
  .topbar-controls { flex-wrap: wrap; }
  #pitcherInputWrap, #teamSelect { min-width: 0; width: 100%; }
  .two-col, .three-col { grid-template-columns: 1fr; }
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .stat-cell:nth-child(2n) { border-right: none; }
  .stat-cell:nth-child(n+3) { border-top: 1px solid var(--border); }
  .matchup-row { padding: 10px 12px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <span class="logo">⬡ Pitcher Lens</span>
  <div class="topbar-controls">
    <div class="field-wrap" id="pitcherInputWrap">
      <span class="field-label">Pitcher</span>
      <div class="autocomplete-wrap">
        <input type="text" id="pitcherInput" placeholder="Search pitcher…" autocomplete="off" />
        <div class="autocomplete-list" id="pitcherList"></div>
      </div>
    </div>
    <div class="field-wrap">
      <span class="field-label">Opposing Team</span>
      <select id="teamSelect"><option value="">Select team…</option></select>
    </div>
    <button class="btn-analyze" id="analyzeBtn" onclick="runAnalysis()">Analyze</button>
  </div>
</div>

<div class="main" id="main">
  <div class="state-box">
    <span class="icon">⚾</span>
    Search a pitcher and pick the opposing team.<br>
    Get pitch zones, rolling game logs, and a full matchup breakdown.
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════
const SEASON = 2025;

const MLB_TEAMS = [
  {id:109,abbr:'ARI',name:'Arizona Diamondbacks'},{id:144,abbr:'ATL',name:'Atlanta Braves'},
  {id:110,abbr:'BAL',name:'Baltimore Orioles'},{id:111,abbr:'BOS',name:'Boston Red Sox'},
  {id:112,abbr:'CHC',name:'Chicago Cubs'},{id:145,abbr:'CWS',name:'Chicago White Sox'},
  {id:113,abbr:'CIN',name:'Cincinnati Reds'},{id:114,abbr:'CLE',name:'Cleveland Guardians'},
  {id:115,abbr:'COL',name:'Colorado Rockies'},{id:116,abbr:'DET',name:'Detroit Tigers'},
  {id:117,abbr:'HOU',name:'Houston Astros'},{id:118,abbr:'KC',name:'Kansas City Royals'},
  {id:108,abbr:'LAA',name:'Los Angeles Angels'},{id:119,abbr:'LAD',name:'Los Angeles Dodgers'},
  {id:146,abbr:'MIA',name:'Miami Marlins'},{id:158,abbr:'MIL',name:'Milwaukee Brewers'},
  {id:142,abbr:'MIN',name:'Minnesota Twins'},{id:121,abbr:'NYM',name:'New York Mets'},
  {id:147,abbr:'NYY',name:'New York Yankees'},{id:133,abbr:'OAK',name:'Oakland Athletics'},
  {id:143,abbr:'PHI',name:'Philadelphia Phillies'},{id:134,abbr:'PIT',name:'Pittsburgh Pirates'},
  {id:135,abbr:'SD',name:'San Diego Padres'},{id:137,abbr:'SF',name:'San Francisco Giants'},
  {id:136,abbr:'SEA',name:'Seattle Mariners'},{id:138,abbr:'STL',name:'St. Louis Cardinals'},
  {id:139,abbr:'TB',name:'Tampa Bay Rays'},{id:140,abbr:'TEX',name:'Texas Rangers'},
  {id:141,abbr:'TOR',name:'Toronto Blue Jays'},{id:120,abbr:'WSH',name:'Washington Nationals'},
];

const ZONE_LABELS = ['IN\nHI','MID\nHI','OUT\nHI','IN\nMID','HEART','OUT\nMID','IN\nLO','MID\nLO','OUT\nLO'];

// ═══════════════════════════════════════════════════════════════
// SETUP
// ═══════════════════════════════════════════════════════════════
const teamSel = document.getElementById('teamSelect');
MLB_TEAMS.forEach(t => {
  const o = document.createElement('option');
  o.value = t.id; o.textContent = `${t.abbr} – ${t.name}`;
  teamSel.appendChild(o);
});

let selectedPitcher = null;
const pitcherInput = document.getElementById('pitcherInput');
const pitcherList  = document.getElementById('pitcherList');

pitcherInput.addEventListener('input', async () => {
  const q = pitcherInput.value.trim();
  selectedPitcher = null;
  if (q.length < 3) { pitcherList.classList.remove('open'); return; }
  try {
    const r = await fetch(`https://statsapi.mlb.com/api/v1/people/search?names=${encodeURIComponent(q)}&sportIds=1&active=true`);
    const d = await r.json();
    const pitchers = (d.people || []).filter(p => p.primaryPosition?.code === '1');
    pitcherList.innerHTML = '';
    if (!pitchers.length) { pitcherList.classList.remove('open'); return; }
    pitchers.forEach(p => {
      const item = document.createElement('div');
      item.className = 'autocomplete-item';
      item.innerHTML = `${p.fullName}<div class="sub">${p.currentTeam?.name || '—'} · ${p.primaryPosition?.name || 'P'}</div>`;
      item.addEventListener('click', () => {
        selectedPitcher = p;
        pitcherInput.value = p.fullName;
        pitcherList.classList.remove('open');
      });
      pitcherList.appendChild(item);
    });
    pitcherList.classList.add('open');
  } catch(e) { pitcherList.classList.remove('open'); }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.autocomplete-wrap')) pitcherList.classList.remove('open');
});

pitcherInput.addEventListener('keydown', e => { if (e.key === 'Enter' && selectedPitcher) runAnalysis(); });

// ═══════════════════════════════════════════════════════════════
// DATA FETCHERS
// ═══════════════════════════════════════════════════════════════
async function fetchPitcherSeasonStats(id) {
  const [r1, r2] = await Promise.all([
    fetch(`https://statsapi.mlb.com/api/v1/people/${id}/stats?stats=season&group=pitching&season=${SEASON}&sportId=1`),
    fetch(`https://statsapi.mlb.com/api/v1/people/${id}/stats?stats=sabermetrics&group=pitching&season=${SEASON}&sportId=1`)
  ]);
  const [d1, d2] = await Promise.all([r1.json(), r2.json()]);
  const s   = d1.stats?.[0]?.splits?.[0]?.stat || {};
  const sab = d2.stats?.[0]?.splits?.[0]?.stat || {};
  const bf  = parseFloat(s.battersFaced) || 1;
  return {
    era:    parseFloat(s.era) || null,
    fip:    parseFloat(sab.fip) || null,
    xera:   parseFloat(sab.xEra) || null,
    whip:   parseFloat(s.whip) || null,
    kPct:   s.strikeOuts ? s.strikeOuts / bf : null,
    bbPct:  s.baseOnBalls ? s.baseOnBalls / bf : null,
    hrPer9: s.homeRuns && s.inningsPitched ? (s.homeRuns / parseFloat(s.inningsPitched)) * 9 : null,
    ip:     parseFloat(s.inningsPitched) || 0,
    so:     s.strikeOuts || 0,
    bb:     s.baseOnBalls || 0,
    wins:   s.wins || 0,
    losses: s.losses || 0,
    gs:     s.gamesStarted || 0,
  };
}

async function fetchGameLog(id) {
  const r = await fetch(`https://statsapi.mlb.com/api/v1/people/${id}/stats?stats=gameLog&group=pitching&season=${SEASON}&sportId=1`);
  const d = await r.json();
  return (d.stats?.[0]?.splits || []).slice(-15).reverse(); // most recent first
}

async function fetchTeamStats(teamId) {
  const r = await fetch(`https://statsapi.mlb.com/api/v1/teams/${teamId}/stats?stats=season&group=hitting&season=${SEASON}&sportId=1`);
  const d = await r.json();
  const s = d.stats?.[0]?.splits?.[0]?.stat || {};
  const pa = parseFloat(s.plateAppearances) || 1;
  return {
    avg:    parseFloat(s.avg) || null,
    obp:    parseFloat(s.obp) || null,
    slg:    parseFloat(s.slg) || null,
    ops:    parseFloat(s.ops) || null,
    kPct:   s.strikeOuts ? s.strikeOuts / pa : null,
    bbPct:  s.baseOnBalls ? s.baseOnBalls / pa : null,
    hr:     s.homeRuns || 0,
    rbi:    s.rbi || 0,
    hits:   s.hits || 0,
    runs:   s.runs || 0,
  };
}

// ═══════════════════════════════════════════════════════════════
// ZONE SIMULATION (from season K% and trend)
// ═══════════════════════════════════════════════════════════════
// MLB Stats API doesn't expose zone-level data publicly.
// We synthesize zone tendencies from the pitcher's overall
// K%, BB%, and HR/9 to create a realistic directional heatmap.
function buildZoneData(stats) {
  const kRate  = stats.kPct  || 0.20;
  const bbRate = stats.bbPct || 0.08;
  const hrRate = (stats.hrPer9 || 1.2) / 9;

  // Base heat: a good pitcher dominates the corners and low zone
  // Higher K% = hotter edges; Higher BB% = colder edges (control issues); Higher HR rate = hot in middle
  const base = [
    0.55 + kRate - bbRate,       // IN HI
    0.40 + kRate * 0.5,          // MID HI
    0.55 + kRate - bbRate * 0.8, // OUT HI
    0.65 + kRate - bbRate,       // IN MID
    0.50 - hrRate * 8 + kRate,   // HEART (dangerous if up)
    0.65 + kRate - bbRate,       // OUT MID
    0.80 + kRate * 1.2,          // IN LO — low zone dominant
    0.75 + kRate,                // MID LO
    0.80 + kRate * 1.2,          // OUT LO — low & away key
  ];

  // Normalize to 0..1
  const mn = Math.min(...base), mx = Math.max(...base);
  return base.map(v => Math.max(0, Math.min(1, (v - mn) / (mx - mn + 0.001))));
}

// ═══════════════════════════════════════════════════════════════
// SCORING
// ═══════════════════════════════════════════════════════════════
function calcEdge(p, t) {
  let score = 50;
  if (p.kPct && t.kPct) score += ((p.kPct - 0.22) + (t.kPct - 0.21)) * 80;
  if (p.xera || p.fip)  score += (4.20 - (p.xera || p.fip)) * 6;
  if (t.ops)            score += (0.745 - t.ops) * 80;
  if (p.bbPct)          score -= (p.bbPct - 0.08) * 60;
  if (p.hrPer9)         score -= (p.hrPer9 - 1.2) * 8;
  return Math.max(2, Math.min(98, Math.round(score)));
}

function verdictFrom(score) {
  if (score >= 60) return ['Favorable', 'favorable'];
  if (score >= 42) return ['Neutral',   'neutral'];
  return ['Tough', 'tough'];
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
const fmt  = (v, d=2) => v == null ? '—' : (+v).toFixed(d);
const pct  = v => v == null ? '—' : (v*100).toFixed(1) + '%';
const fmtDate = s => { if (!s) return '—'; const d = new Date(s); return `${d.getMonth()+1}/${d.getDate()}`; };

function statColor(v, good, bad, invert=false) {
  if (v == null) return 'plain';
  if (!invert) {
    if (v <= good) return 'good';
    if (v >= bad)  return 'bad';
    return 'mid';
  } else {
    if (v >= good) return 'good';
    if (v <= bad)  return 'bad';
    return 'mid';
  }
}

function zoneColor(heat) {
  // Dark red → orange → yellow → green gradient based on K-success
  if (heat > 0.75) return '#22c55e';
  if (heat > 0.55) return '#84cc16';
  if (heat > 0.40) return '#f59e0b';
  if (heat > 0.25) return '#f97316';
  return '#ef4444';
}

function zoneBg(heat) {
  const r = Math.round(255 * (1 - heat * 0.5));
  const g = Math.round(255 * heat * 0.85);
  return `rgba(${r},${g},40,0.18)`;
}

function edgeBarColor(score) {
  if (score >= 60) return 'var(--green)';
  if (score >= 42) return 'var(--yellow)';
  return 'var(--red)';
}

function gameQuality(game) {
  const s = game.stat;
  const ip = parseFloat(s.inningsPitched) || 0;
  const er = s.earnedRuns || 0;
  const k  = s.strikeOuts || 0;
  if (ip >= 6 && er <= 2) return 'good';
  if (ip >= 5 && er <= 3) return 'mid';
  return 'bad';
}

const DOT_COLOR = { good: 'var(--green)', mid: 'var(--yellow)', bad: 'var(--red)' };

// ═══════════════════════════════════════════════════════════════
// AI ANALYSIS via Claude
// ═══════════════════════════════════════════════════════════════
async function fetchAIAnalysis(pitcherName, teamName, pStats, tStats, edge, recentGames) {
  const recentStr = recentGames.slice(0, 5).map(g => {
    const s = g.stat;
    return `${fmtDate(g.date)}: ${s.inningsPitched} IP, ${s.earnedRuns||0} ER, ${s.strikeOuts||0} K, ${s.baseOnBalls||0} BB vs ${g.opponent?.name||'?'}`;
  }).join('\n');

  const prompt = `You are a sharp baseball analyst. Given these stats, write a concise 3-paragraph matchup breakdown (no headers, no bullets, just paragraphs). Be specific with numbers. Tone: analytical, confident, direct.

PITCHER: ${pitcherName}
Season: K% ${pct(pStats.kPct)}, BB% ${pct(pStats.bbPct)}, ${pStats.xera?'xERA':'FIP'} ${fmt(pStats.xera||pStats.fip)}, WHIP ${fmt(pStats.whip)}, HR/9 ${fmt(pStats.hrPer9)}, ${pStats.ip} IP

Last 5 starts:
${recentStr}

OPPOSING TEAM: ${teamName}
Team K% ${pct(tStats.kPct)}, OPS ${fmt(tStats.ops,3)}, AVG ${fmt(tStats.avg,3)}, SLG ${fmt(tStats.slg,3)}, BB% ${pct(tStats.bbPct)}

EDGE SCORE: ${edge}/100

Paragraph 1: Assess the pitcher's current form and what their stats say about their stuff.
Paragraph 2: How does the opposing team's profile match up specifically against this pitcher's tendencies?
Paragraph 3: Key factors that will determine the outcome — what to watch for, and a clear take on the matchup.`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await response.json();
  return data.content?.[0]?.text || 'Analysis unavailable.';
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
let activeLogWindow = 5;

function renderZoneGrid(zoneData) {
  return `
  <div class="zone-wrap">
    <div class="zone-title">Strike Zone — K% Success by Location</div>
    <div class="zone-grid">
      ${zoneData.map((heat, i) => {
        const label = ZONE_LABELS[i].replace('\n','<br>');
        return `<div class="zone-cell" style="background:${zoneBg(heat)};border:1.5px solid ${zoneColor(heat)}40;"
          title="${ZONE_LABELS[i].replace('\n',' ')}: ${Math.round(heat*100)}% effectiveness">
          <span style="color:${zoneColor(heat)};font-size:9px;text-align:center;line-height:1.2;">${label}</span>
        </div>`;
      }).join('')}
    </div>
    <div class="zone-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Dominant</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Average</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>Vulnerable</div>
    </div>
  </div>`;
}

function renderGameLog(games, window) {
  const rows = games.slice(0, window);
  if (!rows.length) return `<div style="padding:20px;color:var(--muted);font-size:12px;">No game log data available.</div>`;

  return `
  <table class="log-table">
    <thead>
      <tr>
        <th>Date</th><th>Opp</th><th>IP</th><th>H</th><th>ER</th><th>K</th><th>BB</th><th>HR</th><th>ERA</th>
      </tr>
    </thead>
    <tbody>
      ${rows.map(g => {
        const s = g.stat;
        const q = gameQuality(g);
        return `<tr>
          <td><span class="perf-dot" style="background:${DOT_COLOR[q]}"></span>${fmtDate(g.date)}</td>
          <td style="color:var(--muted2)">${g.opponent?.abbreviation || g.opponent?.name?.slice(0,3) || '—'}</td>
          <td class="${parseFloat(s.inningsPitched)>=6?'good':parseFloat(s.inningsPitched)>=5?'mid':'bad'}">${s.inningsPitched||'—'}</td>
          <td>${s.hits||0}</td>
          <td class="${(s.earnedRuns||0)<=2?'good':(s.earnedRuns||0)<=4?'mid':'bad'}">${s.earnedRuns||0}</td>
          <td class="${(s.strikeOuts||0)>=7?'good':(s.strikeOuts||0)>=4?'mid':'bad'}">${s.strikeOuts||0}</td>
          <td>${s.baseOnBalls||0}</td>
          <td class="${(s.homeRuns||0)===0?'good':(s.homeRuns||0)===1?'mid':'bad'}">${s.homeRuns||0}</td>
          <td class="${parseFloat(s.era)<=3.00?'good':parseFloat(s.era)<=4.50?'mid':'bad'}">${s.era||'—'}</td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;
}

function renderMatchupRows(pStats, tStats) {
  const rows = [
    { label: 'K%', pVal: pct(pStats.kPct), tVal: pct(tStats.kPct),
      pNum: pStats.kPct||0, tNum: tStats.kPct||0,
      pColor: statColor(pStats.kPct, 0.26, 0.19, true),
      tColor: statColor(tStats.kPct, 0.24, 0.18, true),
      note: 'Pitcher K% vs Team K%' },
    { label: 'BB%', pVal: pct(pStats.bbPct), tVal: pct(tStats.bbPct),
      pNum: pStats.bbPct||0, tNum: tStats.bbPct||0,
      pColor: statColor(pStats.bbPct, 0.07, 0.12),
      tColor: statColor(tStats.bbPct, 0.09, 0.14, true),
      note: 'Walk rate — pitcher control vs team patience' },
    { label: 'xERA/OPS', pVal: fmt(pStats.xera||pStats.fip), tVal: fmt(tStats.ops,3),
      pNum: pStats.xera||pStats.fip||0, tNum: tStats.ops||0,
      pColor: statColor(pStats.xera||pStats.fip, 3.50, 4.50),
      tColor: statColor(tStats.ops, 0.700, 0.760),
      note: 'Pitcher quality vs team offensive output' },
    { label: 'WHIP / AVG', pVal: fmt(pStats.whip), tVal: fmt(tStats.avg,3),
      pNum: pStats.whip||0, tNum: tStats.avg||0,
      pColor: statColor(pStats.whip, 1.10, 1.40),
      tColor: statColor(tStats.avg, 0.235, 0.270),
      note: 'Baserunners allowed vs team contact rate' },
    { label: 'HR/9 / SLG', pVal: fmt(pStats.hrPer9), tVal: fmt(tStats.slg,3),
      pNum: pStats.hrPer9||0, tNum: tStats.slg||0,
      pColor: statColor(pStats.hrPer9, 0.9, 1.5),
      tColor: statColor(tStats.slg, 0.380, 0.450),
      note: 'Power vulnerability vs team power' },
  ];

  return rows.map(row => {
    const pW = Math.min(100, Math.round((row.pNum / (row.pNum + row.tNum + 0.001)) * 100));
    return `
    <div class="matchup-row">
      <div class="matchup-val left ${row.pColor}">${row.pVal}</div>
      <div class="matchup-stat-name">${row.label}</div>
      <div class="matchup-val right ${row.tColor}">${row.tVal}</div>
      <div class="matchup-bar-wrap">
        <div class="matchup-bar-track">
          <div class="matchup-bar-fill" style="left:0;width:${pW}%;background:var(--accent);opacity:0.5;"></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function buildHTML(pitcher, team, pStats, tStats, zoneData, gamelog, edge) {
  const [vLabel, vClass] = verdictFrom(edge);
  const xeraLabel = pStats.xera ? 'xERA' : 'FIP';
  const xeraVal   = pStats.xera || pStats.fip;

  return `
  <!-- VERDICT BANNER -->
  <div class="verdict-banner">
    <div>
      <div class="matchup-title">${pitcher.fullName} <span class="vs">vs</span> ${team.name}</div>
      <div class="edge-row" style="margin-top:10px;max-width:340px;">
        <span style="font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);white-space:nowrap;">Edge</span>
        <div class="edge-track"><div class="edge-fill" style="width:${edge}%;background:${edgeBarColor(edge)};"></div></div>
        <span class="edge-num" style="color:${edgeBarColor(edge)}">${edge}</span>
      </div>
    </div>
    <span class="verdict-pill ${vClass}">${vLabel}</span>
  </div>

  <!-- ROW 1: Pitcher Season Stats + Zone -->
  <div class="two-col">
    <div class="card">
      <div class="card-head">
        <span class="card-title">Pitcher Season Stats</span>
        <span style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted)">${pStats.gs} GS · ${pStats.ip} IP</span>
      </div>
      <div class="stat-grid">
        <div class="stat-cell">
          <div class="stat-lbl">K%</div>
          <div class="stat-val ${statColor(pStats.kPct, 0.26, 0.19, true)}">${pct(pStats.kPct)}</div>
          <div class="stat-sub">${pStats.so} K total</div>
        </div>
        <div class="stat-cell">
          <div class="stat-lbl">BB%</div>
          <div class="stat-val ${statColor(pStats.bbPct, 0.07, 0.12)}">${pct(pStats.bbPct)}</div>
          <div class="stat-sub">${pStats.bb} BB total</div>
        </div>
        <div class="stat-cell">
          <div class="stat-lbl">${xeraLabel}</div>
          <div class="stat-val ${statColor(xeraVal, 3.50, 4.50)}">${fmt(xeraVal)}</div>
          <div class="stat-sub">ERA ${fmt(pStats.era)}</div>
        </div>
        <div class="stat-cell">
          <div class="stat-lbl">WHIP</div>
          <div class="stat-val ${statColor(pStats.whip, 1.10, 1.40)}">${fmt(pStats.whip)}</div>
          <div class="stat-sub">HR/9 ${fmt(pStats.hrPer9)}</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><span class="card-title">Pitch Zone Tendencies</span></div>
      ${renderZoneGrid(zoneData)}
    </div>
  </div>

  <!-- ROW 2: Team Stats -->
  <div class="card full-col">
    <div class="card-head">
      <span class="card-title">${team.abbr} Offensive Profile</span>
      <span style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted)">${SEASON} Season</span>
    </div>
    <div class="stat-grid" style="grid-template-columns:repeat(5,1fr)">
      <div class="stat-cell">
        <div class="stat-lbl">K%</div>
        <div class="stat-val ${statColor(tStats.kPct, 0.24, 0.18, true)}">${pct(tStats.kPct)}</div>
        <div class="stat-sub">batters K'd</div>
      </div>
      <div class="stat-cell">
        <div class="stat-lbl">OPS</div>
        <div class="stat-val ${statColor(tStats.ops, 0.700, 0.780)}">${fmt(tStats.ops, 3)}</div>
        <div class="stat-sub">on-base + slug</div>
      </div>
      <div class="stat-cell">
        <div class="stat-lbl">AVG</div>
        <div class="stat-val ${statColor(tStats.avg, 0.235, 0.275)}">${fmt(tStats.avg, 3)}</div>
        <div class="stat-sub">batting avg</div>
      </div>
      <div class="stat-cell">
        <div class="stat-lbl">SLG</div>
        <div class="stat-val ${statColor(tStats.slg, 0.380, 0.460)}">${fmt(tStats.slg, 3)}</div>
        <div class="stat-sub">slugging</div>
      </div>
      <div class="stat-cell">
        <div class="stat-lbl">BB%</div>
        <div class="stat-val plain">${pct(tStats.bbPct)}</div>
        <div class="stat-sub">walk rate</div>
      </div>
    </div>
  </div>

  <!-- ROW 3: Game Log -->
  <div class="card full-col">
    <div class="card-head">
      <span class="card-title">Recent Game Log</span>
      <div class="log-tabs" style="padding:0;gap:4px;">
        ${[5,10,15].map(w => `<button class="log-tab${w===activeLogWindow?' active':''}" onclick="switchLog(${w})">${w} games</button>`).join('')}
      </div>
    </div>
    <div class="log-table-wrap" id="logTableWrap">
      ${renderGameLog(gamelog, activeLogWindow)}
    </div>
  </div>

  <!-- ROW 4: Deep Matchup -->
  <div class="card full-col">
    <div class="card-head"><span class="card-title">Head-to-Head Breakdown</span></div>
    ${renderMatchupRows(pStats, tStats)}
  </div>

  <!-- ROW 5: AI Analysis -->
  <div class="card full-col">
    <div class="card-head"><span class="card-title">Matchup Analysis</span></div>
    <div id="analysisBox">
      <div class="analysis-loading">
        <div class="analysis-dot"></div>
        <div class="analysis-dot"></div>
        <div class="analysis-dot"></div>
        <span style="margin-left:4px;">Generating analysis…</span>
      </div>
    </div>
  </div>

  <p class="source-note">MLB Stats API · ${SEASON} season · Zone model derived from K%/BB%/HR-rate tendencies</p>
  `;
}

// ═══════════════════════════════════════════════════════════════
// MAIN
// ═══════════════════════════════════════════════════════════════
let currentPitcher, currentTeam, currentPStats, currentTStats, currentGamelog;

function switchLog(w) {
  activeLogWindow = w;
  document.querySelectorAll('.log-tab').forEach(t => {
    t.classList.toggle('active', parseInt(t.textContent) === w);
  });
  document.getElementById('logTableWrap').innerHTML = renderGameLog(currentGamelog, w);
}

async function runAnalysis() {
  if (!selectedPitcher) { pitcherInput.focus(); return; }
  const teamId = +teamSel.value;
  if (!teamId) { teamSel.focus(); return; }

  const team = MLB_TEAMS.find(t => t.id === teamId);
  document.getElementById('analyzeBtn').disabled = true;
  activeLogWindow = 5;

  document.getElementById('main').innerHTML = `<div class="state-box"><div class="spinner"></div>Pulling data from MLB Stats API…</div>`;

  try {
    const [pStats, tStats, rawLog] = await Promise.all([
      fetchPitcherSeasonStats(selectedPitcher.id),
      fetchTeamStats(teamId),
      fetchGameLog(selectedPitcher.id),
    ]);

    if (!pStats.ip) {
      document.getElementById('main').innerHTML = `<div class="state-box"><span class="icon">⚠️</span>No ${SEASON} stats found for ${selectedPitcher.fullName}.</div>`;
      document.getElementById('analyzeBtn').disabled = false;
      return;
    }

    currentPitcher = selectedPitcher;
    currentTeam    = team;
    currentPStats  = pStats;
    currentTStats  = tStats;
    currentGamelog = rawLog;

    const zoneData = buildZoneData(pStats);
    const edge     = calcEdge(pStats, tStats);

    document.getElementById('main').innerHTML = buildHTML(selectedPitcher, team, pStats, tStats, zoneData, rawLog, edge);

    // Stream AI analysis in async
    fetchAIAnalysis(selectedPitcher.fullName, team.name, pStats, tStats, edge, rawLog)
      .then(text => {
        const box = document.getElementById('analysisBox');
        if (box) {
          const paras = text.split(/\n\n+/).filter(Boolean);
          box.innerHTML = `<div class="analysis-box">${paras.map(p => `<p style="margin-bottom:12px;">${p}</p>`).join('')}</div>`;
        }
      })
      .catch(() => {
        const box = document.getElementById('analysisBox');
        if (box) box.innerHTML = `<div class="analysis-box" style="color:var(--muted)">Analysis unavailable.</div>`;
      });

  } catch(err) {
    document.getElementById('main').innerHTML = `<div class="state-box"><span class="icon">⚠️</span>Something went wrong.<br><small style="opacity:0.5">${err.message}</small></div>`;
  }

  document.getElementById('analyzeBtn').disabled = false;
}
</script>
